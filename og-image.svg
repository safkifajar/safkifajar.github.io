<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b0b1a"/>
      <stop offset="100%" stop-color="#1a1233"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c5cff"/>
      <stop offset="50%" stop-color="#ff5cb1"/>
      <stop offset="100%" stop-color="#ffd166"/>
    </linearGradient>
    <radialGradient id="orb1" cx="0.2" cy="0.3" r="0.4">
      <stop offset="0%" stop-color="#7c5cff" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#7c5cff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb2" cx="0.85" cy="0.8" r="0.35">
      <stop offset="0%" stop-color="#ff5cb1" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#ff5cb1" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#orb1)"/>
  <rect width="1200" height="630" fill="url(#orb2)"/>

  <!-- Logo -->
  <text x="80" y="100" font-family="'Space Grotesk', sans-serif" font-size="32" font-weight="700" fill="#ffffff">Safki<tspan fill="url(#accent)">.</tspan></text>

  <!-- Badge -->
  <rect x="80" y="170" width="180" height="44" rx="22" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)"/>
  <text x="170" y="200" text-anchor="middle" font-family="'Inter', sans-serif" font-size="16" fill="#a5a5b8">Hello, I'm</text>

  <!-- Name -->
  <text x="80" y="310" font-family="'Space Grotesk', sans-serif" font-size="88" font-weight="800" fill="#ffffff" letter-spacing="-3">Safki Fajar</text>
  <text x="80" y="410" font-family="'Space Grotesk', sans-serif" font-size="88" font-weight="800" fill="url(#accent)" letter-spacing="-3">Fatmawan</text>

  <!-- Tagline -->
  <text x="80" y="475" font-family="'Inter', sans-serif" font-size="26" font-weight="500" fill="#a5a5b8">Product Manager <tspan fill="#ff5cb1">•</tspan> Fintech &amp; Edutech Innovator</text>

  <!-- Bottom strip -->
  <text x="80" y="560" font-family="'Space Grotesk', monospace" font-size="18" fill="#6b6b80" letter-spacing="2">BUILDING IMPACTFUL DIGITAL PRODUCTS</text>

  <!-- Decorative gradient bar bottom -->
  <rect x="80" y="585" width="1040" height="3" fill="url(#accent)" opacity="0.6"/>
</svg>
